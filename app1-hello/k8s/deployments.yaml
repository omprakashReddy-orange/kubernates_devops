apiVersion: apps/v1
kind: Deployment
metadata:
  name: myspringbootapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myspringbootapp
  template:
    metadata:
      labels:
        app: myspringbootapp
    spec:
      containers:
        - name: myspringbootapp
          image: embarkx/hello-spring:latest
#          env:
#            - name: ENV_VALUE
#              value: "production"
#            - name: DEBUG
#              value: "false"
#            - name: VERSION
#              value: "1.0"
#            - name: APP_NAME
#              value: "MyApp"
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
            - name: ENV_VALUE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENV_VALUE
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_MESSAGE
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: myspringbootapp
spec:
  ports:
    - nodePort: 32000
      port: 8080
      targetPort: 8080
  selector:
    app: myspringbootapp
  type: NodePort
