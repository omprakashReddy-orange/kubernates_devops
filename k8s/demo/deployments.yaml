apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: myapp
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx
          image: nginx:latest
#          env:
#            - name: ENV
#              value: "production"
#            - name: DEBUG
#              value: "false"
#            - name: VERSION
#              value: "1.0"
#            - name: APP_NAME
#              value: "MyApp"
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_ENV
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_MESSAGE
          ports:
            - containerPort: 80


---
apiVersion: v1
kind: Service
metadata:
  name: myapp
spec:
  ports:
    - nodePort: 31584
      port: 80
      targetPort: 80
  selector:
    app: web
  type: NodePort
