name: env_secrets.yml
on:
  push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: install
        env:
          SECRET: dev
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run:
          echo "environment variable SECRET is ${SECRET}"
          echo "environment variable DB_PASSWORD is ${DB_PASSWORD}"
      - name: create demo files
        run: |
          echo "This is a demo file" > demo.txt
          echo "This is another demo file" > demo2.txt
          echo "Files created successfully"
      - name: upload artifacts demo
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: .


