name: hello_spring_ci
on:
  push

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and Test
        working-directory: docker/app1-hello/springboot/hello-spring
        run: mvn -B clean verify

      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: docker/app1-hello/springboot/hello-spring/target/surefire-reports
  Docker-build_push:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: checkout code
        run: echo "hello world"

      - name: Setup Java
        run: echo "setup java"

      - name: Build JAR for docker
        run: echo "JAR build for docker"

      - name: Setup Docker
        run: echo "setup docker"

      - name: Build and Push Docker Image
        run: echo "build and push docker image"
