apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: service-a
  name: service-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
        - name: service-a
          image: embarkx/tax-service-a:latest
          env:
            - name: TAX_SERVICE_URL
              value: "http://service-b:4000"
            - name: PORT
              value: "3000"
#          env:
#            - name: DB_USERNAME
#              valueFrom:
#                secretKeyRef:
#                  name: app-secret
#                  key: DB_USERNAME
#            - name: DB_PASSWORD
#              valueFrom:
#                secretKeyRef:
#                  name: app-secret
#                  key: DB_PASSWORD
#            - name: APP_ENV
#              valueFrom:
#                configMapKeyRef:
#                  name: app-config
#                  key: APP_ENV
#            - name: APP_MESSAGE
#              valueFrom:
#                configMapKeyRef:
#                  name: app-config
#                  key: APP_MESSAGE
          ports:
            - containerPort: 80


---
apiVersion: v1
kind: Service
metadata:
  name: service-a
spec:
  ports:
    - nodePort: 30001
      port: 3000
      targetPort: 3000
  selector:
    app: service-a
  type: NodePort
